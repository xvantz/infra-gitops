# Default values (prod-oriented)
replicaCount: 2

image:
  repository: git.827482.xyz/xvantz/animark
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: traefik
  host: animark.827482.xyz

resources:
  limits:
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

env:
  - name: ANIMARK_ENV
    value: production
  - name: LOG_LEVEL
    value: info
